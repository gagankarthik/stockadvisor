name: Deploy to AWS

# Push to main -> build both Lambda container images and deploy via AWS SAM.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build

      # SAM's --resolve-s3 doesn't reliably provision a bucket for image-type
      # stacks, so create a deterministic deployment bucket ourselves (idempotent)
      # and pass it via --s3-bucket.
      - name: Ensure SAM deployment bucket
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="marketdesk-sam-deploy-${ACCOUNT}-${AWS_REGION}"
          echo "DEPLOY_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Deployment bucket $BUCKET already exists."
          elif [ "$AWS_REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET"
          else
            aws s3api create-bucket --bucket "$BUCKET" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket "$DEPLOY_BUCKET" \
            --s3-prefix marketdesk \
            --resolve-image-repos \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              FinnhubKey=${{ secrets.FINNHUB_KEY }} \
              AlphaVantageKey=${{ secrets.ALPHAVANTAGE_KEY }} \
              OpenAIKey=${{ secrets.OPENAI_API_KEY }} \
              CorsOrigin=${{ vars.CORS_ORIGIN || '*' }}

      - name: Show API URL
        run: |
          aws cloudformation describe-stacks --stack-name marketdesk \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text
