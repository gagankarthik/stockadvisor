name: Deploy to AWS

# Push to main -> build both Lambda container images and deploy via AWS SAM.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # for OIDC role assumption
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --resolve-image-repos \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              FinnhubKey=${{ secrets.FINNHUB_KEY }} \
              AlphaVantageKey=${{ secrets.ALPHAVANTAGE_KEY }} \
              OpenAIKey=${{ secrets.OPENAI_API_KEY }} \
              CorsOrigin=${{ vars.CORS_ORIGIN || '*' }}

      - name: Show API URL
        run: |
          aws cloudformation describe-stacks --stack-name marketdesk \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text
