# Defaults for `sam deploy`. The GitHub Actions workflow passes secrets via
# --parameter-overrides; locally you can run `sam deploy` and these apply.
version = 0.1

[default.deploy.parameters]
stack_name = "marketdesk"
# Deployment bucket is created/passed explicitly by CI (--s3-bucket); do not set
# resolve_s3 here or SAM errors on "--s3-bucket and --resolve-s3 are mutually exclusive".
resolve_image_repos = true   # SAM creates/uses ECR repos for the images
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
